<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJI Mini 4K - Leer App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .menu-item {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .menu-item:active {
            transform: scale(0.95);
        }

        .menu-item .icon {
            font-size: 3.5em;
            margin-bottom: 10px;
        }

        .menu-item .title {
            font-size: 1.1em;
            font-weight: 700;
            color: #333;
        }

        .detail-view {
            display: none;
            animation: slideIn 0.3s;
        }

        .detail-view.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .back-btn:active {
            transform: scale(0.95);
        }

        .detail-title {
            font-size: 2em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .visual-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
        }

        .controller-body {
            background: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 350px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stick-area {
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-bottom: 30px;
        }

        .stick {
            flex: 1;
            text-align: center;
        }

        .stick-base {
            width: 70px;
            height: 70px;
            background: #1a1a1a;
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
        }

        .stick-knob {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .stick-label {
            color: white;
            font-size: 0.75em;
            margin-top: 8px;
            font-weight: 600;
        }

        .stick-desc {
            color: rgba(255,255,255,0.8);
            font-size: 0.7em;
            margin-top: 5px;
            line-height: 1.4;
        }

        .arrow {
            position: absolute;
            font-size: 1.8em;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .arrow.up { 
            top: -20px; 
            left: 50%; 
            transform: translateX(-50%);
        }
        .arrow.down { 
            bottom: -20px; 
            left: 50%; 
            transform: translateX(-50%); 
        }
        .arrow.left { 
            left: -20px; 
            top: 50%; 
            transform: translateY(-50%); 
        }
        .arrow.right { 
            right: -20px; 
            top: 50%; 
            transform: translateY(-50%); 
        }

        .buttons-area {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }

        .button {
            background: #e74c3c;
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
            font-size: 0.8em;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            text-align: center;
            flex: 1;
        }

        .button.rth {
            background: #f39c12;
        }

        .button.pause {
            background: #3498db;
        }

        .drone {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
            border-radius: 15px;
            position: relative;
            margin: 40px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .drone::before {
            content: '🚁';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.5em;
        }

        .propeller {
            width: 35px;
            height: 35px;
            background: rgba(78, 205, 196, 0.6);
            border-radius: 50%;
            position: absolute;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .propeller.tl { top: -12px; left: -12px; }
        .propeller.tr { top: -12px; right: -12px; }
        .propeller.bl { bottom: -12px; left: -12px; }
        .propeller.br { bottom: -12px; right: -12px; }

        .movement-indicator {
            text-align: center;
            font-size: 2.5em;
            color: #4ecdc4;
            margin: 20px 0;
            font-weight: bold;
        }

        .instruction {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.1em;
            line-height: 1.6;
            color: #2e7d32;
        }

        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1em;
            line-height: 1.6;
            color: #856404;
        }

        .tip {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1em;
            line-height: 1.6;
            color: #1565c0;
        }

        .ground {
            height: 15px;
            background: linear-gradient(to bottom, #95a5a6, #7f8c8d);
            border-radius: 10px;
            position: relative;
        }

        .ground::after {
            content: '🌱🌿🌱';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9em;
        }

        .safety-box {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin: 15px 0;
        }

        .safety-box h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
        }

        .safety-box p {
            opacity: 0.95;
            line-height: 1.6;
            font-size: 1.05em;
        }

        .hidden {
            display: none;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚁 DJI Mini 4K</h1>
            <p>Kies wat je wilt leren</p>
        </div>

        <!-- Main Menu -->
        <div id="mainMenu" class="menu">
            <div class="menu-item" onclick="showDetail('controller')">
                <div class="icon">🎮</div>
                <div class="title">De Controller</div>
            </div>
            <div class="menu-item" onclick="showDetail('takeoff')">
                <div class="icon">⬆️</div>
                <div class="title">Opstijgen</div>
            </div>
            <div class="menu-item" onclick="showDetail('forward')">
                <div class="icon">➡️</div>
                <div class="title">Vooruit</div>
            </div>
            <div class="menu-item" onclick="showDetail('sideways')">
                <div class="icon">↔️</div>
                <div class="title">Zijwaarts</div>
            </div>
            <div class="menu-item" onclick="showDetail('rotate')">
                <div class="icon">↻</div>
                <div class="title">Draaien</div>
            </div>
            <div class="menu-item" onclick="showDetail('landing')">
                <div class="icon">⬇️</div>
                <div class="title">Landen</div>
            </div>
            <div class="menu-item" onclick="showDetail('emergency')">
                <div class="icon">🆘</div>
                <div class="title">Noodknoppen</div>
            </div>
            <div class="menu-item" onclick="showDetail('safety')">
                <div class="icon">⚠️</div>
                <div class="title">Veiligheid</div>
            </div>
        </div>

        <!-- Detail Views -->
        <div id="detailContainer"></div>
    </div>

            rotate: {

            safety: {

                            <div style="font-size: 3em; margin-bottom: 15px;">👀</div>

        function showDetail(type) {
            document.getElementById('mainMenu').classList.add('hidden');
            const container = document.getElementById('detailContainer');
            container.innerHTML = `
                <button class="back-btn" onclick="goBack()">← Terug</button>
                <div class="detail-view active">
                    ${content[type].html}
                </div>
            `;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goBack() {
            document.getElementById('mainMenu').classList.remove('hidden');
            document.getElementById('detailContainer').innerHTML = '';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
