<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJI Mini 4K - 5 Minuten Crash Course</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .timer {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            color: white;
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            position: relative;
        }

        .step-counter {
            position: absolute;
            top: -15px;
            left: 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .step-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 15px;
            padding-top: 10px;
        }

        .step-desc {
            font-size: 1.1em;
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .visual {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
            position: relative;
        }

        .controller {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            position: relative;
        }

        .controller-body {
            background: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
            border-radius: 30px;
            padding: 40px 30px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .stick-area {
            display: flex;
            justify-content: space-between;
            gap: 40px;
            margin-bottom: 30px;
        }

        .stick {
            flex: 1;
            position: relative;
        }

        .stick-base {
            width: 80px;
            height: 80px;
            background: #1a1a1a;
            border-radius: 50%;
            margin: 0 auto;
            position: relative;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.5);
        }

        .stick-knob {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .stick-label {
            text-align: center;
            color: white;
            font-size: 0.9em;
            margin-top: 10px;
            font-weight: 600;
        }

        .arrow {
            position: absolute;
            font-size: 2em;
            color: #4ecdc4;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .arrow.up { top: -25px; left: 50%; transform: translateX(-50%); }
        .arrow.down { bottom: -25px; left: 50%; transform: translateX(-50%); }
        .arrow.left { left: -25px; top: 50%; transform: translateY(-50%); }
        .arrow.right { right: -25px; top: 50%; transform: translateY(-50%); }

        .buttons-area {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .button {
            background: #e74c3c;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .button.rth {
            background: #f39c12;
        }

        .button.pause {
            background: #3498db;
        }

        .drone-visual {
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            position: relative;
        }

        .drone {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #2d3436 0%, #636e72 100%);
            border-radius: 20px;
            position: relative;
            margin: 50px auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .drone::before {
            content: '🚁';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3em;
        }

        .propeller {
            width: 40px;
            height: 40px;
            background: rgba(78, 205, 196, 0.6);
            border-radius: 50%;
            position: absolute;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .propeller.tl { top: -15px; left: -15px; }
        .propeller.tr { top: -15px; right: -15px; }
        .propeller.bl { bottom: -15px; left: -15px; }
        .propeller.br { bottom: -15px; right: -15px; }

        .movement-arrow {
            font-size: 3em;
            color: #4ecdc4;
            position: absolute;
            animation: move 2s infinite;
        }

        @keyframes move {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .movement-arrow.forward { top: -60px; left: 50%; transform: translateX(-50%); }
        .movement-arrow.up { top: -80px; left: 50%; transform: translateX(-50%) rotate(-90deg); }
        .movement-arrow.rotate { top: 50%; right: -60px; transform: translateY(-50%); }

        .next-btn {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
            transition: all 0.3s;
        }

        .next-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(78, 205, 196, 0.6);
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.3s;
        }

        .dot.active {
            background: white;
            transform: scale(1.3);
        }

        .hidden {
            display: none;
        }

        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            color: #856404;
        }

        .tip {
            background: #d1ecf1;
            border-left: 4px solid #17a2b8;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            color: #0c5460;
        }

        .ground {
            height: 20px;
            background: linear-gradient(to bottom, #95a5a6, #7f8c8d);
            border-radius: 10px;
            margin-top: 20px;
            position: relative;
        }

        .ground::after {
            content: '🌱🌿🌱';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
        }

        .height-indicator {
            text-align: center;
            font-size: 1.5em;
            color: #4ecdc4;
            font-weight: bold;
            margin: 10px 0;
        }

        .finish-screen {
            text-align: center;
            padding: 40px 20px;
        }

        .finish-screen h2 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 20px;
        }

        .finish-screen .emoji {
            font-size: 5em;
            margin: 20px 0;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚁 DJI Mini 4K</h1>
            <p>5 Minuten Crash Course</p>
        </div>

        <div class="timer" id="timer">5:00</div>

        <div class="progress-dots" id="progressDots"></div>

        <div id="stepsContainer"></div>

        <div class="card hidden" id="finishCard">
            <div class="finish-screen">
                <div class="emoji">🎉</div>
                <h2>Gefeliciteerd!</h2>
                <p style="font-size: 1.2em; color: #666; margin: 20px 0;">Je kent nu de basics van de DJI Mini 4K!</p>
                <p style="color: #999;">Tijd om te gaan vliegen! Begin rustig en houd afstand van obstakels.</p>
                <button class="restart-btn" onclick="location.reload()">↻ Opnieuw doorlopen</button>
            </div>
        </div>
    </div>

    <script>
        const steps = [
            {
                title: "De Controller",
                description: "Dit is je afstandsbediening. Je hebt 2 sticks en 3 belangrijke knoppen.",
                visual: 'controller',
                content: `
                    <div class="visual">
                        <div class="controller">
                            <div class="controller-body">
                                <div class="stick-area">
                                    <div class="stick">
                                        <div class="stick-base">
                                            <div class="stick-knob"></div>
                                        </div>
                                        <div class="stick-label">LINKER STICK</div>
                                        <div style="text-align: center; color: white; font-size: 0.8em; margin-top: 5px;">
                                            ↕️ Hoogte<br>↔️ Draaien
                                        </div>
                                    </div>
                                    <div class="stick">
                                        <div class="stick-base">
                                            <div class="stick-knob"></div>
                                        </div>
                                        <div class="stick-label">RECHTER STICK</div>
                                        <div style="text-align: center; color: white; font-size: 0.8em; margin-top: 5px;">
                                            ↕️ Voor/Achter<br>↔️ Links/Rechts
                                        </div>
                                    </div>
                                </div>
                                <div class="buttons-area">
                                    <div class="button rth">RTH<br><span style="font-size: 0.7em;">Kom terug</span></div>
                                    <div class="button pause">⏸<br><span style="font-size: 0.7em;">Pauzeer</span></div>
                                    <div class="button">📸<br><span style="font-size: 0.7em;">Foto/Video</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="tip">
                        💡 <strong>Onthoud:</strong> Kleine bewegingen zijn genoeg! De drone is heel gevoelig.
                    </div>
                `
            },
            {
                title: "Opstijgen",
                description: "Trek de linker stick voorzichtig naar boven om op te stijgen naar 1,5 meter hoogte.",
                visual: 'takeoff',
                content: `
                    <div class="visual">
                        <div class="controller-body" style="max-width: 250px; margin: 0 auto; padding: 30px 20px;">
                            <div class="stick">
                                <div class="stick-base">
                                    <div class="stick-knob"></div>
                                    <div class="arrow up">⬆️</div>
                                </div>
                                <div class="stick-label">LINKER STICK OMHOOG</div>
                            </div>
                        </div>
                        <div style="margin-top: 30px;">
                            <div class="drone-visual">
                                <div class="movement-arrow up">⬆️</div>
                                <div class="drone">
                                    <div class="propeller tl"></div>
                                    <div class="propeller tr"></div>
                                    <div class="propeller bl"></div>
                                    <div class="propeller br"></div>
                                </div>
                                <div class="height-indicator">1,5 meter</div>
                                <div class="ground"></div>
                            </div>
                        </div>
                    </div>
                    <div class="warning">
                        ⚠️ Ga langzaam! Trek de stick niet helemaal omhoog, halverwege is genoeg.
                    </div>
                `
            },
            {
                title: "Vooruit Vliegen",
                description: "Duw de rechter stick naar voren om de drone vooruit te laten vliegen.",
                visual: 'forward',
                content: `
                    <div class="visual">
                        <div class="controller-body" style="max-width: 250px; margin: 0 auto; padding: 30px 20px;">
                            <div class="stick">
                                <div class="stick-base">
                                    <div class="stick-knob"></div>
                                    <div class="arrow up">⬆️</div>
                                </div>
                                <div class="stick-label">RECHTER STICK VOORUIT</div>
                            </div>
                        </div>
                        <div style="margin-top: 30px;">
                            <div class="drone-visual">
                                <div class="movement-arrow forward">➡️</div>
                                <div class="drone">
                                    <div class="propeller tl"></div>
                                    <div class="propeller tr"></div>
                                    <div class="propeller bl"></div>
                                    <div class="propeller br"></div>
                                </div>
                                <div class="ground"></div>
                            </div>
                        </div>
                    </div>
                    <div class="tip">
                        💡 <strong>Tip:</strong> Laat de stick los en de drone stopt automatisch en blijft zweven!
                    </div>
                `
            },
            {
                title: "Zijwaarts Vliegen",
                description: "Beweeg de rechter stick naar links of rechts om zijwaarts te vliegen.",
                visual: 'sideways',
                content: `
                    <div class="visual">
                        <div class="controller-body" style="max-width: 250px; margin: 0 auto; padding: 30px 20px;">
                            <div class="stick">
                                <div class="stick-base">
                                    <div class="stick-knob"></div>
                                    <div class="arrow left">⬅️</div>
                                    <div class="arrow right">➡️</div>
                                </div>
                                <div class="stick-label">RECHTER STICK LINKS/RECHTS</div>
                            </div>
                        </div>
                        <div style="margin-top: 30px; text-align: center;">
                            <div style="font-size: 3em; margin: 20px 0;">
                                ⬅️ 🚁 ➡️
                            </div>
                            <div style="color: #666; font-size: 1.1em;">
                                De drone vliegt zijwaarts zonder te draaien
                            </div>
                        </div>
                    </div>
                    <div class="tip">
                        💡 <strong>Probeer:</strong> Vlieg een vierkant: vooruit → rechts → achteruit → links
                    </div>
                `
            },
            {
                title: "Draaien (Roteren)",
                description: "Beweeg de linker stick naar links/rechts om de drone te laten draaien.",
                visual: 'rotate',
                content: `
                    <div class="visual">
                        <div class="controller-body" style="max-width: 250px; margin: 0 auto; padding: 30px 20px;">
                            <div class="stick">
                                <div class="stick-base">
                                    <div class="stick-knob"></div>
                                    <div class="arrow left">⬅️</div>
                                    <div class="arrow right">➡️</div>
                                </div>
                                <div class="stick-label">LINKER STICK LINKS/RECHTS</div>
                            </div>
                        </div>
                        <div style="margin-top: 30px;">
                            <div class="drone-visual">
                                <div class="drone" style="animation: rotate 3s linear infinite;">
                                    <div class="propeller tl"></div>
                                    <div class="propeller tr"></div>
                                    <div class="propeller bl"></div>
                                    <div class="propeller br"></div>
                                </div>
                                <div style="text-align: center; margin-top: 20px; color: #4ecdc4; font-size: 1.3em; font-weight: bold;">
                                    ↻ De drone draait op zijn plek
                                </div>
                            </div>
                        </div>
                    </div>
                    <style>
                        @keyframes rotate {
                            from { transform: rotate(0deg); }
                            to { transform: rotate(360deg); }
                        }
                    </style>
                    <div class="warning">
                        ⚠️ Dit is even wennen! Begin met kleine draaiingen.
                    </div>
                `
            },
            {
                title: "Landen",
                description: "Trek de linker stick langzaam naar beneden om te landen. Ga rustig!",
                visual: 'landing',
                content: `
                    <div class="visual">
                        <div class="controller-body" style="max-width: 250px; margin: 0 auto; padding: 30px 20px;">
                            <div class="stick">
                                <div class="stick-base">
                                    <div class="stick-knob"></div>
                                    <div class="arrow down">⬇️</div>
                                </div>
                                <div class="stick-label">LINKER STICK OMLAAG</div>
                            </div>
                        </div>
                        <div style="margin-top: 30px;">
                            <div class="drone-visual">
                                <div class="drone" style="margin-top: 20px;">
                                    <div class="propeller tl" style="animation-duration: 2s;"></div>
                                    <div class="propeller tr" style="animation-duration: 2s;"></div>
                                    <div class="propeller bl" style="animation-duration: 2s;"></div>
                                    <div class="propeller br" style="animation-duration: 2s;"></div>
                                </div>
                                <div style="text-align: center; margin: 15px 0; color: #e74c3c; font-size: 1.3em; font-weight: bold;">
                                    ⬇️ Langzaam naar beneden
                                </div>
                                <div class="ground"></div>
                            </div>
                        </div>
                    </div>
                    <div class="warning">
                        ⚠️ <strong>Belangrijk:</strong> Land langzaam en op een vlakke ondergrond. Geen gras of zand!
                    </div>
                `
            },
            {
                title: "Noodknoppen",
                description: "Raak in paniek? Druk op PAUSE of RTH!",
                visual: 'emergency',
                content: `
                    <div class="visual">
                        <div style="text-align: center; padding: 20px;">
                            <div style="font-size: 4em; margin: 20px 0;">⏸️</div>
                            <h3 style="color: #3498db; font-size: 1.5em; margin-bottom: 10px;">PAUSE Knop</h3>
                            <p style="color: #666; font-size: 1.1em; line-height: 1.6;">
                                Drone stopt DIRECT en blijft zweven op de plek waar hij is.
                            </p>
                        </div>
                        <div style="height: 2px; background: #ddd; margin: 20px 0;"></div>
                        <div style="text-align: center; padding: 20px;">
                            <div style="font-size: 4em; margin: 20px 0;">🏠</div>
                            <h3 style="color: #f39c12; font-size: 1.5em; margin-bottom: 10px;">RTH (Return To Home)</h3>
                            <p style="color: #666; font-size: 1.1em; line-height: 1.6;">
                                Drone vliegt automatisch terug naar waar je opstijgt bent.
                            </p>
                        </div>
                    </div>
                    <div class="tip">
                        💡 <strong>Gouden regel:</strong> Bij twijfel → druk op PAUSE. Adem in, denk na, vlieg verder.
                    </div>
                `
            },
            {
                title: "Veiligheidsregels",
                description: "3 belangrijke regels om ALTIJD te onthouden:",
                visual: 'safety',
                content: `
                    <div style="padding: 20px 0;">
                        <div style="background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; padding: 25px; border-radius: 15px; margin-bottom: 15px;">
                            <div style="font-size: 2.5em; margin-bottom: 10px;">👀</div>
                            <h3 style="font-size: 1.4em; margin-bottom: 10px;">1. Houd de drone altijd in zicht</h3>
                            <p style="opacity: 0.9;">Vlieg NOOIT verder dan je kunt zien!</p>
                        </div>
                        
                        <div style="background: linear-gradient(135deg, #f39c12, #e67e22); color: white; padding: 25px; border-radius: 15px; margin-bottom: 15px;">
                            <div style="font-size: 2.5em; margin-bottom: 10px;">👥</div>
                            <h3 style="font-size: 1.4em; margin-bottom: 10px;">2. Blijf weg van mensen</h3>
                            <p style="opacity: 0.9;">Minimaal 10 meter afstand van anderen!</p>
                        </div>
                        
                        <div style="background: linear-gradient(135deg, #3498db, #2980b9); color: white; padding: 25px; border-radius: 15px;">
                            <div style="font-size: 2.5em; margin-bottom: 10px;">🌧️</div>
                            <h3 style="font-size: 1.4em; margin-bottom: 10px;">3. Check het weer</h3>
                            <p style="opacity: 0.9;">Geen regen, geen harde wind (check de app!)</p>
                        </div>
                    </div>
                `
            }
        ];

        let currentStep = 0;
        let timeLeft = 300; // 5 minutes in seconds
        let timerInterval;

        function renderSteps() {
            const container = document.getElementById('stepsContainer');
            const progressDots = document.getElementById('progressDots');
            
            // Create progress dots
            progressDots.innerHTML = steps.map((_, i) => 
                `<div class="dot ${i === currentStep ? 'active' : ''}"></div>`
            ).join('');

            // Render current step
            container.innerHTML = `
                <div class="card">
                    <div class="step-counter">${currentStep + 1}</div>
                    <h2 class="step-title">${steps[currentStep].title}</h2>
                    <p class="step-desc">${steps[currentStep].description}</p>
                    ${steps[currentStep].content}
                    <button class="next-btn" onclick="nextStep()">
                        ${currentStep < steps.length - 1 ? 'Volgende →' : 'Afronden! 🎉'}
                    </button>
                </div>
            `;
        }

        function nextStep() {
            if (currentStep < steps.length - 1) {
                currentStep++;
                renderSteps();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                finish();
            }
        }

        function finish() {
            clearInterval(timerInterval);
            document.getElementById('stepsContainer').classList.add('hidden');
            document.getElementById('progressDots').classList.add('hidden');
            document.getElementById('timer').classList.add('hidden');
            document.getElementById('finishCard').classList.remove('hidden');
        }

        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft > 0) {
                timeLeft--;
            } else {
                clearInterval(timerInterval);
            }
        }

        // Start timer
        timerInterval = setInterval(updateTimer, 1000);

        // Initial render
        renderSteps();
    </script>
</body>
</html>
